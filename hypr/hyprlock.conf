general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = /home/watashi/Pictures/wallpapers/blackforest.jpg
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- ПАНЕЛЬ ПОДЛОЖКИ (Эффект "карточки") ---
shape {
    monitor =
    size = 500, 600
    color = rgba(17, 17, 17, 0.2)
    rounding = 25
    border_size = 0
    position = 0, 0
    halign = center
    valign = center
}

# --- Блок аватара (сверху) ---
image {
    monitor =
    path = /home/watashi/Downloads/grifith.jpg  # Убедись, что путь верный
    size = 180
    rounding = -1
    border_size = 2
    border_color = rgba(200, 200, 200, 0.5)
    position = 0, 190           # Подними его выше центра
    halign = center 
    valign = center
}

# --- Блок аватара (сверху) ---
image {
    monitor =
    path = /home/watashi/Downloads/ava.jpg  # Убедись, что путь верный
    size = 180
    rounding = -1
    border_size = 2
    border_color = rgba(200, 200, 200, 0.5)
    position = 0, 190           # Подними его выше центра
    halign = center
    valign = center
}

# --- Приветствие (сразу под аватаром) ---
label {
    monitor =
    text = You’re welcome, Watashi
    color = rgba(200, 200, 200, 1.0)
    font_size = 20
    font_family = Noto Sans
    position = 0, 70            # Расположи под аватаром
    halign = center
    valign = center
}

# --- Поле ввода (центр) ---

input-field {
    monitor =
    size = 250, 45
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true

    # --- ЭТА СТРОКА ДЕЛАЕТ ПОЛЕ ВИДИМЫМ ВСЕГДА ---
    fade_on_empty = false
    # ---------------------------------------------

    placeholder_text = <i> LOCKED  </i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# --- Время (снизу) ---
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Noto Sans Bold
    position = 0, -120          # Сдвинь вниз от центра
    halign = center
    valign = center
}

# --- Дата (под временем) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(200, 200, 200, 0.8)
    font_size = 20
    font_family = Noto Sans
    position = 0, -190          # Еще ниже
    halign = center
    valign = center
}
